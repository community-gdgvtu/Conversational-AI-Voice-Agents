[from-internal]
exten => 5000,1,Answer()
exten => 5000,n,Wait(1)

; --- 1. INTRO ---
exten => 5000,n,System(rm -f /tmp/ai_response.ulaw /tmp/hangup.flag)
exten => 5000,n,AGI(/usr/local/bin/ai_bridge.py,intro)
exten => 5000,n,Playback(/tmp/ai_response)

; --- 2. CONVERSATION LOOP ---
exten => 5000,n(conversation),NoOp(--- AI Turn ---)
exten => 5000,n,System(rm -f /tmp/user_audio.wav /tmp/ai_response.ulaw /tmp/hangup.flag)
exten => 5000,n,Playback(beep)

; Record: Stop after 1 second of silence, max 15s.
exten => 5000,n,Record(/tmp/user_audio.wav,1,15,y)
exten => 5000,n,Wait(0.2)

; --- 3. RUN AI ---
exten => 5000,n,AGI(/usr/local/bin/ai_bridge.py,chat)
exten => 5000,n,Playback(/tmp/ai_response)

; --- 4. CHECK HANGUP ---
exten => 5000,n,System(test -f /tmp/hangup.flag)
exten => 5000,n,GotoIf($["${SYSTEMSTATUS}" = "SUCCESS"]?end_call)

exten => 5000,n,Wait(0.5)
exten => 5000,n,Goto(conversation)

; --- 5. END ---
exten => 5000,n(end_call),Hangup()