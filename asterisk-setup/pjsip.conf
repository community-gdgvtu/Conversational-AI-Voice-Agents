[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
external_media_address=YOUR_VM_EXTERNAL_IP
external_signaling_address=YOUR_VM_EXTERNAL_IP

[1001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
auth=1001
aors=1001

[1001]
type=auth
auth_type=userpass
password=your_secure_password
username=1001

[1001]
type=aor
max_contacts=1
